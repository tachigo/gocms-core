[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    p0: 阻塞上线的核心用例
    p1: 影响体验的重要用例
    p2: 锦上添花的次要用例
    user: user Module
    permission: permission Module
    media: media Module
    settings: settings Module
    article: article Module
    page: page Module
    menu: menu Module
    taxonomy: taxonomy Module
    security: 安全验证
    performance: 性能验证
    event: Event 总线验证
    v1_regression: v1.0 Bug 回归检查
addopts = -v --tb=short
