# ============================================================
# GoCMS v2.0 Nginx 反向代理配置（容器内部，仅 HTTP）
# 路径: deploy/nginx/gocms-v2.conf
#
# 域名: pre-demo.gocms.tachigo.com
# 代理: gocms:8080 (gocms-v2-app 容器)
#
# 架构:
#   客户端 → 宿主机 Nginx(:443 SSL) → Docker Nginx(:8080) → GoCMS(:8080)
# ============================================================

# 上游应用（Docker 容器网络内使用服务名）
upstream gocms_v2_backend {
    server gocms:8080;
    keepalive 32;
}

# HTTP 配置（宿主机 Nginx 处理 SSL 终止）
server {
    listen 80;
    server_name pre-demo.gocms.tachigo.com;

    # ------ Gzip ------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # 上传大小限制（10MB）
    client_max_body_size 12m;

    # ==========================================================
    # 1. 健康检查（外部探针用 /api/health，内部映射到 /health）
    # ==========================================================
    location = /api/health {
        proxy_pass http://gocms_v2_backend/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ==========================================================
    # 2. 上传文件直出（Nginx 直接返回，不经过 Go 进程）
    # ==========================================================
    location /uploads/ {
        alias /var/www/gocms/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;

        # 防止直接执行上传文件
        location ~* \.(php|jsp|asp|sh|py)$ {
            deny all;
        }
    }

    # ==========================================================
    # 3. 管理后台 SPA 静态资源（长缓存，含 hash 指纹）
    # ==========================================================
    location ~* ^/admin/assets/ {
        proxy_pass http://gocms_v2_backend;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ==========================================================
    # 4. 后台 API
    # ==========================================================
    location /api/ {
        proxy_pass http://gocms_v2_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # API 不缓存
        add_header Cache-Control "no-store" always;
    }

    # ==========================================================
    # 5. 管理后台 SPA 入口
    # ==========================================================
    location /admin {
        proxy_pass http://gocms_v2_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ==========================================================
    # 6. 前台通配（所有其他请求）
    # ==========================================================
    location / {
        proxy_pass http://gocms_v2_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 前台页面短缓存
        add_header Cache-Control "public, max-age=60, s-maxage=300" always;
    }

    # ==========================================================
    # 7. SSO 测试接口（P1 集成验证用）
    # ==========================================================
    location /api/admin/sso-test {
        proxy_pass http://gocms_v2_backend/api/admin/settings;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-SSO-User-ID     "999";
        proxy_set_header X-SSO-Role        "sso_manager";
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ==========================================================
    # 8. 内部健康检查（Go 原始端点）
    # ==========================================================
    location = /health {
        proxy_pass http://gocms_v2_backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # Sitemap & Robots
    location = /sitemap.xml {
        proxy_pass http://gocms_v2_backend;
        proxy_set_header Host $host;
        expires 1h;
    }

    location = /robots.txt {
        proxy_pass http://gocms_v2_backend;
        proxy_set_header Host $host;
        expires 1d;
    }
}
