# ============================================================
# GoCMS v2.0 Docker Compose 配置（预发环境 - Nginx 容器模式）
# ============================================================

services:
  # ---------- Nginx 反向代理 ----------
  nginx:
    image: nginx:alpine
    container_name: gocms-v2-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      # Nginx 主配置
      - ./nginx/gocms-v2.conf:/etc/nginx/conf.d/default.conf:ro
      # 上传文件目录（Nginx 直接服务）
      - gocms-v2-uploads:/var/www/gocms/uploads:ro
    depends_on:
      - gocms
    networks:
      - gocms-v2-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ---------- GoCMS v2.0 应用 ----------
  gocms:
    build:
      context: ../src
      dockerfile: Dockerfile
    image: gocms-v2:${GOCMS_VERSION:-2.0.0}
    container_name: gocms-v2-app
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      # 配置文件（只读挂载，运行时不修改）
      - ./config:/app/config:ro
      # SQLite 数据库文件（持久化到 data/）
      - gocms-v2-data:/app/data
      # 上传文件目录（持久化到 uploads/）
      - gocms-v2-uploads:/app/uploads
    environment:
      - TZ=Asia/Shanghai
      - GOCMS_DB_PATH=${GOCMS_DB_PATH:-data/gocms.db}
      - GOCMS_JWT_SECRET=${GOCMS_JWT_SECRET:-changeme-in-production}
      - GOCMS_SERVER_PORT=${GOCMS_SERVER_PORT:-8080}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - gocms-v2-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  gocms-v2-data:
    driver: local
  gocms-v2-uploads:
    driver: local

networks:
  gocms-v2-net:
    driver: bridge
